<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Dashboard</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <aside class="col-lg-3 sidebar p-4">

                <h2 class="text-white mb-4">
                    TaskFlow
                </h2>

                <!-- Search -->
                <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search task..." />

                <!-- Category -->
                <select id="categoryFilter" class="form-select mb-3">
                    <option value="">All Categories</option>
                    <option value="Study">Study</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                </select>

                <!-- Priority -->
                <select id="priorityFilter" class="form-select mb-3">
                    <option value="">All Priorities</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <!-- Status -->
                <select id="statusFilter" class="form-select mb-4">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Completed">Completed</option>
                </select>

                <!-- Stats -->
                <div class="stats text-white">
                    <h5>Statistics</h5>

                    <p>Total: <span id="totalTasks">0</span></p>
                    <p>Completed: <span id="completedTasks">0</span></p>
                    <p>Pending: <span id="pendingTasks">0</span></p>
                    <p>inProgressTasks: <span id="inProgressTasks">0</span></p>
                </div>

            </aside>

            <!-- MAIN CONTENT -->
            <main class="col-lg-9 p-4">

                <!-- Add Task Form -->
                <div class="task-form p-4 rounded-4 mb-4">

                    <h3 class="mb-3">
                        Add New Task
                    </h3>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input type="text" id="taskTitle" class="form-control" placeholder="Task Title" />
                        </div>

                        <div class="col-md-6">
                            <select id="taskCategory" class="form-select">
                                <option disabled selected>Select Category</option>
                                <option>Study</option>
                                <option>Work</option>
                                <option>Personal</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <select id="taskPriority" class="form-select">
                                <option disabled selected>Select Priority</option>
                                <option>Low</option>
                                <option>Medium</option>
                                <option>High</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <select id="taskStatus" class="form-select">
                                <option disabled selected>Select Status</option>
                                <option>Pending</option>
                                <option>In Progress</option>
                                <option>Completed</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <button id="addTaskBtn" class="btn btn-primary w-100">
                                Add Task
                            </button>
                        </div>

                    </div>
                </div>

                <!-- Tasks -->
                <div class="row g-4" id="tasksContainer"></div>

            </main>

        </div>

    </div>

    <!-- JS Module -->
    <script type="module" src="js/main.js"></script>

</body>

</html>
